<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonials | GML Learning Portal</title>
    <script src="FlashPlayer/ruffle.js"></script>
    <style>
        /* Force display and colors */
        :root {
            --ixl-green: #51B700;
            --ixl-blue: #0073BB;
            --ixl-bg: #F9F9F9;
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%;
            height: 100%; 
            background-color: white !important; 
            color: #333;
            font-family: Arial, sans-serif;
        }

        header { 
            background: white; 
            border-bottom: 1px solid #e0e0e0; 
            padding: 15px 10%; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 24px; font-weight: bold; color: var(--ixl-blue); }
        .logo span { color: var(--ixl-green); }

        .btn-green { 
            background: var(--ixl-green); 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer; 
        }

        #about-content { padding: 40px 10%; display: block; }
        
        .card { 
            background: var(--ixl-bg); 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            margin-bottom: 20px; 
        }

        /* Hidden Sections */
        #login-section, #flash-section { display: none; }

    </style>
</head>
<body>

    <header>
        <div class="logo">GML<span>Learning</span></div>
        <button class="btn-green" onclick="showLogin()">Sign in</button>
    </header>

    <div id="about-content">
        <h1 style="text-align:center;">What Educators Are Saying</h1>
        <div class="card">
            <p>"The GML Learning Portal has been a staple in my classroom for years."</p>
            <p><strong>- Principal Peterson</strong></p>
        </div>
    </div>

    <div id="login-section" style="height: 80vh; display: none; align-items: center; justify-content: center;">
        <div style="border: 1px solid #ccc; padding: 30px; border-radius: 5px; background: white; text-align: center;">
            <h2 style="color: var(--ixl-blue);">Sign in</h2>
            <input type="text" id="secret-field" placeholder="Username" onclick="checkSecret()" readonly style="padding: 10px; width: 200px;">
        </div>
    </div>

    <div id="flash-section" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:9999;">
        <div id="drop-target" style="height:100%; color: #444; display:flex; align-items:center; justify-content:center; border: 5px dashed #222;">
            <h2>Drop Module (.swf)</h2>
        </div>
        <div id="ruffle-container"></div>
    </div>

    <script>
        let clicks = 0;

        function showLogin() {
            document.getElementById('about-content').style.display = 'none';
            document.getElementById('login-section').style.display = 'flex';
        }

        function checkSecret() {
            clicks++;
            if (clicks >= 5) {
                document.getElementById('flash-section').style.display = 'block';
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") location.reload();
        });

        // Drag and Drop Logic
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.swf')) {
                document.getElementById('drop-target').style.display = 'none';
                const ruffle = window.RufflePlayer.newest();
                const player = ruffle.createPlayer();
                document.getElementById('ruffle-container').appendChild(player);
                player.load({ url: URL.createObjectURL(file), autoplay: "on" });
            }
        });
    </script>
</body>
</html>
